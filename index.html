<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  header {
    background: #4a3f8f;
    color: #fff;
    padding: 24px;
    text-align: center;
  }
  header h1 { font-size: 24px; font-weight: 600; }
  header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .input-row {
    display: flex;
    padding: 16px;
    gap: 8px;
    border-bottom: 1px solid #eee;
  }
  #itemInput {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  #itemInput:focus { border-color: #667eea; }
  #addBtn {
    padding: 12px 20px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #addBtn:hover { background: #5568d3; }
  #addBtn:active { transform: scale(0.97); }
  #addBtn:disabled { opacity: 0.6; cursor: not-allowed; }
  .status {
    padding: 10px 16px;
    font-size: 13px;
    text-align: center;
    background: #f7f7f9;
    color: #666;
    border-bottom: 1px solid #eee;
  }
  .status.error { background: #fde8e6; color: #c0392b; }
  .status.hidden { display: none; }
  .list {
    list-style: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  .list-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .list-item:hover { background: #fafafa; }
  .list-item:last-child { border-bottom: none; }
  .checkbox {
    width: 22px;
    height: 22px;
    cursor: pointer;
    margin-right: 12px;
    accent-color: #667eea;
  }
  .item-text {
    flex: 1;
    font-size: 15px;
    color: #333;
    word-break: break-word;
  }
  .item-text.checked {
    text-decoration: line-through;
    color: #aaa;
  }
  .delete-btn {
    background: transparent;
    border: none;
    color: #e74c3c;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: #fde8e6; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    background: #f7f7f9;
    font-size: 13px;
    color: #666;
  }
  .clear-btn {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 13px;
    text-decoration: underline;
  }
  .clear-btn:hover { color: #e74c3c; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <div class="subtitle">Supabase에 동기화됨</div>
    </header>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 이름 입력..." maxlength="100" autocomplete="off">
      <button id="addBtn">추가</button>
    </div>

    <div class="status hidden" id="status"></div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <span id="count">0개 항목</span>
      <button class="clear-btn" id="clearBtn">완료된 항목 비우기</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://jnivnctqgxvkapxqqtfw.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_cOiGR8HCv9eHiwf9NKveNg_jPDKNwWm";
  const TABLE = "shopping_items";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const input = document.getElementById("itemInput");
  const addBtn = document.getElementById("addBtn");
  const list = document.getElementById("list");
  const count = document.getElementById("count");
  const clearBtn = document.getElementById("clearBtn");
  const statusEl = document.getElementById("status");

  let items = [];

  function showStatus(message, isError = false) {
    statusEl.textContent = message;
    statusEl.classList.remove("hidden");
    statusEl.classList.toggle("error", isError);
  }

  function clearStatus() {
    statusEl.classList.add("hidden");
    statusEl.textContent = "";
  }

  function render() {
    list.innerHTML = "";

    if (items.length === 0) {
      const empty = document.createElement("li");
      empty.className = "empty";
      empty.textContent = "아직 추가된 항목이 없습니다";
      list.appendChild(empty);
    } else {
      items.forEach((item) => {
        const li = document.createElement("li");
        li.className = "list-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "checkbox";
        checkbox.checked = item.checked;
        checkbox.addEventListener("change", () => toggleItem(item.id));

        const span = document.createElement("span");
        span.className = "item-text" + (item.checked ? " checked" : "");
        span.textContent = item.text;

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "✕";
        delBtn.title = "삭제";
        delBtn.addEventListener("click", () => deleteItem(item.id));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    const remaining = items.filter(i => !i.checked).length;
    count.textContent = `${items.length}개 항목 · 남은 ${remaining}개`;
  }

  async function loadItems() {
    showStatus("불러오는 중...");
    const { data, error } = await sb
      .from(TABLE)
      .select("*")
      .order("created_at", { ascending: true });
    if (error) {
      showStatus("불러오기 실패: " + error.message, true);
      return;
    }
    items = data || [];
    clearStatus();
    render();
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;
    addBtn.disabled = true;
    const { data, error } = await sb
      .from(TABLE)
      .insert({ text, checked: false })
      .select()
      .single();
    addBtn.disabled = false;
    if (error) {
      showStatus("추가 실패: " + error.message, true);
      return;
    }
    items.push(data);
    input.value = "";
    clearStatus();
    render();
    input.focus();
  }

  async function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const newChecked = !item.checked;
    const { error } = await sb
      .from(TABLE)
      .update({ checked: newChecked })
      .eq("id", id);
    if (error) {
      showStatus("수정 실패: " + error.message, true);
      render();
      return;
    }
    item.checked = newChecked;
    clearStatus();
    render();
  }

  async function deleteItem(id) {
    const { error } = await sb
      .from(TABLE)
      .delete()
      .eq("id", id);
    if (error) {
      showStatus("삭제 실패: " + error.message, true);
      return;
    }
    items = items.filter(i => i.id !== id);
    clearStatus();
    render();
  }

  async function clearChecked() {
    if (!items.some(i => i.checked)) return;
    if (!confirm("완료된 항목을 모두 삭제할까요?")) return;
    const { error } = await sb
      .from(TABLE)
      .delete()
      .eq("checked", true);
    if (error) {
      showStatus("일괄 삭제 실패: " + error.message, true);
      return;
    }
    items = items.filter(i => !i.checked);
    clearStatus();
    render();
  }

  addBtn.addEventListener("click", addItem);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addItem();
  });
  clearBtn.addEventListener("click", clearChecked);

  loadItems();
  input.focus();
</script>
</body>
</html>
